<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paragrafos e Quebras de Linha</title>
</head>
<body>
    <h1>Paragráfos e Quebras de Linhas</h1>
    <hr/>
    <p>
        Você pode escrever um paragráfos de qualquer jeito. Basta colocar tudo no meio das tags &lt;p&gt; e &lt;/p&gt;.
    </p>
    <p>
        Se precisar quebrar o texto em algum <br/>
        lugar específico, use o &lt;br/&gt;.
    </p>
    <p>
        Vamos adicionar alguns símbolos especiais:

        </br>&reg;</br>
        &copy;  </br>
        &trade; </br>
        &euro;  </br>
        &pound; </br>
        &yen;   </br>
        &cent;  </br>
        &Delta; </br>
        &uarr;  </br>
    </p>
    <p>
        Vamos adicionar alguns emoji:
        </br>&#x1F596;</br>
        &#x1F913;

    </p>
    
</body>
</html>
