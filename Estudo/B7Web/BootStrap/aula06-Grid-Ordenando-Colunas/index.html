<!DOCTYPE html>
<html lang="pt-bt">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
    <link rel="stylesheet" href="assets/css/bootstrap.min.css" />
    <title>Projeto BootStrap4</title>
    <style type="text/css">
        .row [class^=col-], .row .col{
            background-color:#ddd;
            border:1px solid #ccc;
        }
    </style>
</head>
<body>
    
    <div class="container">
        <!--As colunas ficaram ordenadas pela númeração-->
        <div class="row">
            <div class="col order-2">Primeira</div>
            <div class="col order-1">Segunda</div>
            <div class="col order-4">Terceira</div>
            <div class="col order-5">Quarta</div>
            <div class="col order-3">Quinta</div>
        </div>

        <!--As colunas ficaram em ordem pelas não ordenadas, para depois seguir a númeração das ordenadas-->
        <div class="row">
            <div class="col ">Primeira</div>
            <div class="col ">Segunda</div>
            <div class="col order-4">Terceira</div>
            <div class="col order-5">Quarta</div>
            <div class="col order-3">Quinta</div>
        </div>

        <!--Seguirar a ordem das: Declaradas com palavras / Não ordenadas / Ordenadas-->
        <div class="row">
            <div class="col ">Primeira</div>
            <div class="col ">Segunda</div>
            <div class="col order-last">Terceira</div>
            <div class="col order-5">Quarta</div>
            <div class="col order-first">Quinta</div>
        </div>

    </div>
    
    
    <script type="text/javascript" src="assets/js/jquery-3.6.0.min.js"></script>
    <script type="text/javascript" src="assets/js/bootstrap.bundle.min.js"></script>
</body>
</html>
