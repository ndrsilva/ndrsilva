<html lang="pt-br">
<head>

<body>  
    <div>
        <h1>Alterando uma Img.</h1>
        <img src="boy.jpg" id="img" />
        <p>

            <button id="girl" onclick="document.getElementById('img').src='girl.jpg'">Girl</button>
        </p>
    </div>
    

    <script src="script.js"></script>
</body>
